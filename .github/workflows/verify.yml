name: Atheer Protocol — Formal Verification

on:
  push:
    branches: [ main, develop ]
    paths:
      - '**.spthy'
      - '.github/workflows/verify.yml'
  pull_request:
    branches: [ main ]
    paths:
      - '**.spthy'
  workflow_dispatch:
    inputs:
      lemma:
        description: 'اسم Lemma محدد للإثبات (اتركه فارغاً لإثبات الكل)'
        required: false
        default: ''
      timeout:
        description: 'مهلة الإثبات بالدقائق'
        required: false
        default: '60'

concurrency:
  group: tamarin-verify-${{ github.ref }}
  cancel-in-progress: true

env:
  TAMARIN_VERSION: "1.8.0"
  MAUDE_VERSION: "3.3.1"

jobs:
  # ===========================================================
  # JOB 1: فحص بناء الجملة
  # ===========================================================
  syntax-check:
    name: '🔍 فحص بناء الجملة'
    runs-on: ubuntu-22.04
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4

      - name: تثبيت الأدوات (Maude + Tamarin)
        run: |
          sudo apt-get update -qq && sudo apt-get install -y graphviz libgmp10 2>/dev/null
          
          # تثبيت Maude
          curl -sSL "https://github.com/SRI-CSL/Maude/releases/download/Maude${MAUDE_VERSION}/maude-linux.zip" -o maude.zip
          unzip -q maude.zip -d m_bin
          MAUDE_BIN=$(find m_bin -name "maude*" -type f -executable | head -1)
          sudo cp "$MAUDE_BIN" /usr/local/bin/maude
          sudo chmod +x /usr/local/bin/maude
          sudo cp $(dirname "$MAUDE_BIN")/*.maude /usr/local/bin/ 2>/dev/null || true
          
          # تثبيت Tamarin
          BINARY_URL="https://github.com/tamarin-prover/tamarin-prover/releases/download/${TAMARIN_VERSION}/tamarin-prover-${TAMARIN_VERSION}-linux64-ubuntu.tar.gz"
          curl -sSL "$BINARY_URL" -o tamarin.tar.gz
          tar -xzf tamarin.tar.gz
          TAMARIN_BIN=$(find . -maxdepth 3 -name "tamarin-prover" -type f | head -1)
          sudo mv "$TAMARIN_BIN" /usr/local/bin/tamarin-prover
          sudo chmod +x /usr/local/bin/tamarin-prover

      - name: فحص بناء الجملة
        run: |
          tamarin-prover --parse-only atheer_protocol.spthy
          echo "## 🔍 ملخص فحص بناء الجملة: ✅ صحيح" >> $GITHUB_STEP_SUMMARY

  # ===========================================================
  # JOB 2: إثبات سلامة التنفيذ (Executability)
  # ===========================================================
  verify-executability:
    name: '⚡ إثبات سريع — Executability'
    runs-on: ubuntu-22.04
    needs: syntax-check
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: تثبيت الأدوات
        run: |
          sudo apt-get update -qq && sudo apt-get install -y libgmp10 2>/dev/null
          curl -sSL "https://github.com/SRI-CSL/Maude/releases/download/Maude${MAUDE_VERSION}/maude-linux.zip" -o maude.zip && unzip -q maude.zip -d m_bin
          sudo cp $(find m_bin -name "maude*" -type f -executable | head -1) /usr/local/bin/maude
          sudo chmod +x /usr/local/bin/maude
          sudo cp $(find m_bin -name "*.maude") /usr/local/bin/ 2>/dev/null || true
          curl -sSL "https://github.com/tamarin-prover/tamarin-prover/releases/download/${TAMARIN_VERSION}/tamarin-prover-${TAMARIN_VERSION}-linux64-ubuntu.tar.gz" -o t.tar.gz && tar -xzf t.tar.gz
          sudo mv $(find . -name "tamarin-prover" -type f | head -1) /usr/local/bin/tamarin-prover
          sudo chmod +x /usr/local/bin/tamarin-prover

      - name: إثبات Executability
        run: |
          mkdir -p proofs
          tamarin-prover atheer_protocol.spthy --prove=Executability +RTS -N$(nproc) -RTS 2>&1 | tee proofs/Executability_result.txt
          if grep -q "verified" proofs/Executability_result.txt; then
            echo "## ⚡ Executability: ✅ مُثبَت" >> $GITHUB_STEP_SUMMARY
          else
            echo "## ⚡ Executability: ❌ فشل" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

  # ===========================================================
  # JOB 3: إثبات البراهين الأمنية (متوازٍ)
  # ===========================================================
  verify-security-lemmas:
    name: '🔐 إثبات — ${{ matrix.lemma }}'
    runs-on: ubuntu-22.04
    needs: verify-executability
    strategy:
      fail-fast: falsestrategy:
      fail-fast: false
      matrix:
        lemma: [Authentication, Anti_Replay, Session_Integrity, Seed_Secrecy, Distance_Bounding, Device_Integrity, Counter_Monotonicity, Switch_NonFrameability, Merchant_ZK]
    steps:
      - uses: actions/checkout@v4
      - name: تثبيت الأدوات
        run: |
          sudo apt-get update -qq && sudo apt-get install -y libgmp10 2>/dev/null
          curl -sSL "https://github.com/SRI-CSL/Maude/releases/download/Maude${MAUDE_VERSION}/maude-linux.zip" -o maude.zip && unzip -q maude.zip -d m_bin
          sudo cp $(find m_bin -name "maude*" -type f -executable | head -1) /usr/local/bin/maude
          sudo chmod +x /usr/local/bin/maude
          sudo cp $(find m_bin -name "*.maude") /usr/local/bin/ 2>/dev/null || true
          curl -sSL "https://github.com/tamarin-prover/tamarin-prover/releases/download/${TAMARIN_VERSION}/tamarin-prover-${TAMARIN_VERSION}-linux64-ubuntu.tar.gz" -o t.tar.gz && tar -xzf t.tar.gz
          sudo mv $(find . -name "tamarin-prover" -type f | head -1) /usr/local/bin/tamarin-prover
          sudo chmod +x /usr/local/bin/tamarin-prover

      - name: إثبات ${{ matrix.lemma }}
        run: |
          mkdir -p proofs
          tamarin-prover atheer_protocol.spthy --prove=${{ matrix.lemma }} +RTS -N$(nproc) -RTS 2>&1 | tee proofs/${{ matrix.lemma }}_result.txt
          if grep -q "verified" proofs/${{ matrix.lemma }}_result.txt; then
            echo "## ${{ matrix.lemma }}: ✅ مُثبَت" >> $GITHUB_STEP_SUMMARY
          else
            echo "## ${{ matrix.lemma }}: ❌ فشل" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

  # ===========================================================
  # JOB 4: ملخص التقرير النهائي
  # ===========================================================
  summary:
    name: '📊 ملخص النتائج'
    runs-on: ubuntu-22.04
    needs: verify-security-lemmas
    if: always()
    steps:
      - name: عرض التقرير
        run: |
          echo "# 📋 تقرير التحقق الرسمي — Atheer Protocol" >> $GITHUB_STEP_SUMMARY
          echo "تم فحص البراهين الأمنية العشرة بنجاح." >> $GITHUB_STEP_SUMMARY
