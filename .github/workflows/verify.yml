name: Atheer Protocol — Formal Verification

# ============================================================
# يُشغَّل هذا الـ workflow في ثلاث حالات:
#   1. عند كل push إلى main أو develop
#   2. عند فتح أي Pull Request يستهدف main
#   3. يدوياً من واجهة GitHub Actions
# ============================================================
on:
  push:
    branches: [ main, develop ]
    paths:
      - '**.spthy'
      - '.github/workflows/verify.yml'
  pull_request:
    branches: [ main ]
    paths:
      - '**.spthy'
  workflow_dispatch:
    inputs:
      lemma:
        description: 'اسم Lemma محدد للإثبات (اتركه فارغاً لإثبات الكل)'
        required: false
        default: ''
      timeout:
        description: 'مهلة الإثبات بالدقائق'
        required: false
        default: '60'

# ============================================================
# منع التشغيل المتزامن لنفس الـ workflow
# ============================================================
concurrency:
  group: tamarin-verify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ===========================================================
  # JOB 1: التحقق من صحة بناء الجملة (syntax check سريع)
  # ===========================================================
  syntax-check:
    name: '🔍 فحص بناء الجملة'
    runs-on: ubuntu-22.04
    timeout-minutes: 10

    steps:
      - name: استنساخ المستودع
        uses: actions/checkout@v4

      - name: تثبيت Tamarin Prover
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y tamarin-prover graphviz 2>/dev/null || true
          
          # إذا لم يكن متاحاً في apt، نثبته من المصدر
          if ! command -v tamarin-prover &>/dev/null; then
            echo "تثبيت Tamarin من الإصدار الثنائي..."
            curl -sSL https://github.com/tamarin-prover/tamarin-prover/releases/download/1.8.0/tamarin-prover-1.8.0-linux64-ubuntu.tar.gz \
              -o tamarin.tar.gz
            tar -xzf tamarin.tar.gz
            sudo mv tamarin-prover /usr/local/bin/
            rm tamarin.tar.gz
          fi
          
          tamarin-prover --version

      - name: فحص بناء الجملة بدون إثبات
        run: |
          echo "=== فحص ملف البروتوكول ==="
          tamarin-prover atheer_protocol.spthy
          echo "✅ بناء الجملة صحيح"

      - name: عرض ملخص النموذج
        run: |
          echo "=== ملخص النموذج الرسمي ==="
          echo "الملف: atheer_protocol.spthy"
          echo "عدد الأسطر: $(wc -l < atheer_protocol.spthy)"
          echo "عدد القواعد: $(grep -c '^rule ' atheer_protocol.spthy)"
          echo "عدد البراهين: $(grep -c '^lemma ' atheer_protocol.spthy)"
          echo "عدد القيود: $(grep -c '^restriction ' atheer_protocol.spthy)"

  # ===========================================================
  # JOB 2: إثبات برهان سلامة التنفيذ (Executability) — سريع
  # ===========================================================
  verify-executability:
    name: '⚡ إثبات سريع — Executability'
    runs-on: ubuntu-22.04
    needs: syntax-check
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: تثبيت Tamarin Prover
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y tamarin-prover graphviz 2>/dev/null || true
          if ! command -v tamarin-prover &>/dev/null; then
            curl -sSL https://github.com/tamarin-prover/tamarin-prover/releases/download/1.8.0/tamarin-prover-1.8.0-linux64-ubuntu.tar.gz \
              -o tamarin.tar.gz
            tar -xzf tamarin.tar.gz
            sudo mv tamarin-prover /usr/local/bin/
          fi

      - name: إثبات Executability (فحص سلامة النموذج)
        run: |
          echo "=== إثبات Executability ==="
          tamarin-prover atheer_protocol.spthy \
            --prove=Executability \
            +RTS -N2 -RTS \
            2>&1 | tee proofs/executability_result.txt
          
          if grep -q "verified" proofs/executability_result.txt; then
            echo "✅ Executability: مُثبَت — النموذج يحتوي على آثار تنفيذ صحيحة"
          else
            echo "❌ Executability: فشل — النموذج قد يحتوي على خطأ هيكلي"
            exit 1
          fi

      - name: رفع نتائج الإثبات
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: executability-proof
          path: proofs/

  # ===========================================================
  # JOB 3: إثبات البراهين الأمنية الكاملة (11 برهان)
  # ===========================================================
  verify-security-lemmas:
    name: '🔐 إثبات البراهين الأمنية الكاملة'
    runs-on: ubuntu-22.04
    needs: verify-executability
    timeout-minutes: ${{ fromJSON(github.event.inputs.timeout || '60') }}

    strategy:
      fail-fast: false
      matrix:
        lemma:
          - Authentication
          - Anti_Replay
          - Session_Integrity
          - Seed_Secrecy
          - MPC_Split_Security
          - Distance_Bounding
          - Device_Integrity
          - Counter_Monotonicity
          - Switch_NonFrameability

    steps:
      - uses: actions/checkout@v4

      - name: تثبيت Tamarin Prover
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y tamarin-prover graphviz 2>/dev/null || true
          if ! command -v tamarin-prover &>/dev/null; then
            curl -sSL https://github.com/tamarin-prover/tamarin-prover/releases/download/1.8.0/tamarin-prover-1.8.0-linux64-ubuntu.tar.gz \
              -o tamarin.tar.gz
            tar -xzf tamarin.tar.gz
            sudo mv tamarin-prover /usr/local/bin/
          fi

      - name: إثبات ${{ matrix.lemma }}
        run: |
          echo "=== إثبات ${{ matrix.lemma }} ==="
          mkdir -p proofs
          
          tamarin-prover atheer_protocol.spthy \
            --prove=${{ matrix.lemma }} \
            +RTS -N$(nproc) -RTS \
            2>&1 | tee proofs/${{ matrix.lemma }}_result.txt
          
          if grep -q "verified" proofs/${{ matrix.lemma }}_result.txt; then
            echo "✅ ${{ matrix.lemma }}: مُثبَت بنجاح"
          else
            echo "❌ ${{ matrix.lemma }}: فشل الإثبات"
            exit 1
          fi

      - name: رفع نتيجة ${{ matrix.lemma }}
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: proof-${{ matrix.lemma }}
          path: proofs/${{ matrix.lemma }}_result.txt

  # ===========================================================
  # JOB 4: إثبات برهان محدد (عند التشغيل اليدوي)
  # ===========================================================
  verify-single-lemma:
    name: '🎯 إثبات برهان محدد'
    runs-on: ubuntu-22.04
    needs: syntax-check
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.lemma != ''
    timeout-minutes: ${{ fromJSON(github.event.inputs.timeout || '60') }}

    steps:
      - uses: actions/checkout@v4

      - name: تثبيت Tamarin Prover
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y tamarin-prover graphviz 2>/dev/null || true
          if ! command -v tamarin-prover &>/dev/null; then
            curl -sSL https://github.com/tamarin-prover/tamarin-prover/releases/download/1.8.0/tamarin-prover-1.8.0-linux64-ubuntu.tar.gz \
              -o tamarin.tar.gz
            tar -xzf tamarin.tar.gz
            sudo mv tamarin-prover /usr/local/bin/
          fi

      - name: إثبات ${{ github.event.inputs.lemma }}
        run: |
          echo "=== إثبات ${{ github.event.inputs.lemma }} ==="
          mkdir -p proofs
          
          tamarin-prover atheer_protocol.spthy \
            --prove=${{ github.event.inputs.lemma }} \
            +RTS -N$(nproc) -RTS \
            2>&1 | tee proofs/single_lemma_result.txt
          
          cat proofs/single_lemma_result.txt

      - name: رفع النتيجة
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: single-proof-${{ github.event.inputs.lemma }}
          path: proofs/

  # ===========================================================
  # JOB 5: ملخص النتائج النهائي
  # ===========================================================
  summary:
    name: '📊 ملخص نتائج التحقق'
    runs-on: ubuntu-22.04
    needs: verify-security-lemmas
    if: always()

    steps:
      - uses: actions/checkout@v4

      - name: تنزيل جميع نتائج الإثبات
        uses: actions/download-artifact@v4
        with:
          path: all-proofs/

      - name: توليد تقرير موحد
        run: |
          echo "# 📋 تقرير التحقق الرسمي — Atheer Protocol v2.0" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**التاريخ:** $(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          echo "**الـ Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## نتائج البراهين" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| البرهان | النتيجة | الخاصية المُثبَتة |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|---------|-----------------|" >> $GITHUB_STEP_SUMMARY
          
          for lemma in Authentication Anti_Replay Session_Integrity \
                       Seed_Secrecy MPC_Split_Security Distance_Bounding \
                       Device_Integrity Counter_Monotonicity \
                       Switch_NonFrameability; do
            result_file="all-proofs/proof-${lemma}/${lemma}_result.txt"
            if [ -f "$result_file" ] && grep -q "verified" "$result_file"; then
              echo "| \`$lemma\` | ✅ مُثبَت | — |" >> $GITHUB_STEP_SUMMARY
            else
              echo "| \`$lemma\` | ❌ فشل أو غير مكتمل | — |" >> $GITHUB_STEP_SUMMARY
            fi
          done
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## التحسينات المُتحقَّق منها" >> $GITHUB_STEP_SUMMARY
          echo "| التحسين | الـ Lemma | الحالة |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|---------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| سلسلة الثقة (Chain of Trust) | \`Seed_Secrecy\` | انظر أعلاه |" >> $GITHUB_STEP_SUMMARY
          echo "| توقيع العتبة (MPC) | \`MPC_Split_Security\` | انظر أعلاه |" >> $GITHUB_STEP_SUMMARY
          echo "| تحديد المسافة (Distance Bounding) | \`Distance_Bounding\` | انظر أعلاه |" >> $GITHUB_STEP_SUMMARY
          echo "| نزاهة الجهاز (Play Integrity) | \`Device_Integrity\` | انظر أعلاه |" >> $GITHUB_STEP_SUMMARY
          echo "| التوقيت الذري (HW Counter) | \`Counter_Monotonicity\` | انظر أعلاه |" >> $GITHUB_STEP_SUMMARY

      - name: رفع التقرير الموحد
        uses: actions/upload-artifact@v4
        with:
          name: verification-summary
          path: all-proofs/
          retention-days: 90
