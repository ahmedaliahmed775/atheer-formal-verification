name: "Atheer Protocol — Formal Verification"

on:
  push:
    paths: ['atheer_protocol.spthy', '.github/workflows/verify.yml']
  pull_request:
    paths: ['atheer_protocol.spthy', '.github/workflows/verify.yml']
  workflow_dispatch:
    inputs:
      lemma:
        description: 'اسم برهان محدد (فارغ = الكل)'
        required: false
        default: ''
      timeout:
        description: 'مهلة الإثبات بالدقائق'
        required: false
        default: '45'

env:
  TAMARIN_VERSION: "1.8.0"
  TAMARIN_RTS_FLAGS: "+RTS -N2 -M6G -RTS"
  TAMARIN_URL: "https://github.com/tamarin-prover/tamarin-prover/releases/download/1.8.0/tamarin-prover-1.8.0-linux64.tar.gz"

jobs:

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 1: فحص بناء الجملة
  # ─────────────────────────────────────────────────────────────────────────
  syntax-check:
    name: "🔍 فحص بناء الجملة"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Install Tamarin
        run: |
          echo "⬇️  Downloading Tamarin ${{ env.TAMARIN_VERSION }}..."
          curl -fsSL "${{ env.TAMARIN_URL }}" -o tamarin.tar.gz
          tar -xzf tamarin.tar.gz
          sudo mv tamarin-prover /usr/local/bin/tamarin-prover
          sudo chmod +x /usr/local/bin/tamarin-prover
          sudo apt-get update -qq
          sudo apt-get install -y maude
          tamarin-prover --version

      - name: Syntax check
        run: |
          tamarin-prover atheer_protocol.spthy
          echo "✅ بناء الجملة صحيح"

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 2: إثبات Executability
  # ─────────────────────────────────────────────────────────────────────────
  verify-executability:
    name: "⚡ إثبات سريع — Executability"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: syntax-check
    steps:
      - uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Install Tamarin
        run: |
          curl -fsSL "${{ env.TAMARIN_URL }}" -o tamarin.tar.gz
          tar -xzf tamarin.tar.gz
          sudo mv tamarin-prover /usr/local/bin/tamarin-prover
          sudo chmod +x /usr/local/bin/tamarin-prover
          sudo apt-get update -qq
          sudo apt-get install -y maude

      - name: Prove Executability
        run: |
          tamarin-prover atheer_protocol.spthy \
            --prove=Executability \
            ${{ env.TAMARIN_RTS_FLAGS }} \
            2>&1 | tee executability.log

          if grep -q "verified" executability.log; then
            echo "✅ Executability: verified"
          else
            echo "❌ Executability: FAILED"
            cat executability.log
            exit 1
          fi

      - name: Upload log
        if: always()
        uses: actions/upload-artifact@v4
        with