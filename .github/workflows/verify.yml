name: "Atheer Protocol — Formal Verification"

on:
  push:
    paths: ['atheer_protocol.spthy', '.github/workflows/verify.yml']
  pull_request:
    paths: ['atheer_protocol.spthy', '.github/workflows/verify.yml']
  workflow_dispatch:
    inputs:
      lemma:
        description: 'اسم برهان محدد (فارغ = الكل)'
        required: false
        default: ''
      timeout:
        description: 'مهلة الإثبات بالدقائق'
        required: false
        default: '45'

env:
  TAMARIN_VERSION: "1.8.0"
  TAMARIN_RTS_FLAGS: "+RTS -N2 -M6G -RTS"
  TAMARIN_URL: "https://github.com/tamarin-prover/tamarin-prover/releases/download/1.8.0/tamarin-prover-1.8.0-linux64-ubuntu.tar.gz"
  # [FIX] Maude 3.3.1 — آخر إصدار مدعوم صراحةً من Tamarin 1.8.0
  # apt على Ubuntu 24.04 يثبّت 3.2 وهو مرفوض (يُسبب التعليق اللانهائي)
  # القائمة المدعومة: 2.7.1, 3.0, 3.1, 3.2.1, 3.2.2, 3.3, 3.3.1
  MAUDE_VERSION: "3.3.1"
  MAUDE_URL: "https://github.com/maude-lang/Maude/releases/download/Maude3.3.1/Maude-3.3.1-linux.zip"

jobs:

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 1: فحص بناء الجملة
  # ─────────────────────────────────────────────────────────────────────────
  syntax-check:
    name: "🔍 فحص بناء الجملة"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Install Maude ${{ env.MAUDE_VERSION }} + Tamarin ${{ env.TAMARIN_VERSION }}
        run: |
          # ── Maude 3.3.1 (مدعوم) بدلاً من apt maude 3.2 (مرفوض) ──
          curl -fsSL "${{ env.MAUDE_URL }}" -o maude.zip
          unzip -q maude.zip -d maude_dist
          # الملف التنفيذي داخل المجلد المضغوط
          MAUDE_BIN=$(find maude_dist -name "maude.linux64" -type f | head -1)
          sudo cp "${MAUDE_BIN}" /usr/local/bin/maude
          sudo chmod +x /usr/local/bin/maude
          # نسخ ملفات prelude المطلوبة لنفس المجلد
          MAUDE_DIR=$(dirname "${MAUDE_BIN}")
          sudo cp "${MAUDE_DIR}"/*.maude /usr/local/bin/ 2>/dev/null || true
          # ── Tamarin ──
          echo "⬇️  Downloading Tamarin ${{ env.TAMARIN_VERSION }}..."
          curl -fsSL "${{ env.TAMARIN_URL }}" -o tamarin.tar.gz
          tar -xzf tamarin.tar.gz
          sudo mv tamarin-prover /usr/local/bin/tamarin-prover
          sudo chmod +x /usr/local/bin/tamarin-prover
          # ── تحقق ──
          echo "Maude: $(maude --version 2>&1 | head -1)"
          tamarin-prover --version

      - name: Syntax check
        run: |
          tamarin-prover atheer_protocol.spthy
          echo "✅ بناء الجملة صحيح"

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 2: إثبات Executability (سريع — يتحقق من سلامة النموذج)
  # ─────────────────────────────────────────────────────────────────────────
  verify-executability:
    name: "⚡ إثبات سريع — Executability"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: syntax-check
    steps:
      - uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Install Maude ${{ env.MAUDE_VERSION }} + Tamarin ${{ env.TAMARIN_VERSION }}
        run: |
          curl -fsSL "${{ env.MAUDE_URL }}" -o maude.zip
          unzip -q maude.zip -d maude_dist
          MAUDE_BIN=$(find maude_dist -name "maude.linux64" -type f | head -1)
          sudo cp "${MAUDE_BIN}" /usr/local/bin/maude
          sudo chmod +x /usr/local/bin/maude
          MAUDE_DIR=$(dirname "${MAUDE_BIN}")
          sudo cp "${MAUDE_DIR}"/*.maude /usr/local/bin/ 2>/dev/null || true
          curl -fsSL "${{ env.TAMARIN_URL }}" -o tamarin.tar.gz
          tar -xzf tamarin.tar.gz
          sudo mv tamarin-prover /usr/local/bin/tamarin-prover
          sudo chmod +x /usr/local/bin/tamarin-prover

      - name: Prove Executability
        run: |
          tamarin-prover atheer_protocol.spthy \
            --prove=Executability \
            ${{ env.TAMARIN_RTS_FLAGS }} \
            2>&1 | tee executability.log

          if grep -q "verified" executability.log; then
            echo "✅ Executability: verified"
          else
            echo "❌ Executability: FAILED"
            cat executability.log
            exit 1
          fi

      - name: Upload log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: executability-log
          path: executability.log

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 3: البراهين الأمنية (متوازٍ بحد أقصى 4 jobs في آن)
  # ─────────────────────────────────────────────────────────────────────────
  verify-security-lemmas:
    name: "🔐 ${{ matrix.lemma }}"
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: verify-executability
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        lemma:
          - Authentication
          - Anti_Replay
          - Session_Integrity
          - Seed_Secrecy
          - Distance_Bounding
          - Device_Integrity
          - Counter_Monotonicity
          - Merchant_ZeroKnowledge
          - Switch_NonFrameability

    steps:
      - uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Install Maude ${{ env.MAUDE_VERSION }} + Tamarin ${{ env.TAMARIN_VERSION }}
        run: |
          curl -fsSL "${{ env.MAUDE_URL }}" -o maude.zip
          unzip -q maude.zip -d maude_dist
          MAUDE_BIN=$(find maude_dist -name "maude.linux64" -type f | head -1)
          sudo cp "${MAUDE_BIN}" /usr/local/bin/maude
          sudo chmod +x /usr/local/bin/maude
          MAUDE_DIR=$(dirname "${MAUDE_BIN}")
          sudo cp "${MAUDE_DIR}"/*.maude /usr/local/bin/ 2>/dev/null || true
          curl -fsSL "${{ env.TAMARIN_URL }}" -o tamarin.tar.gz
          tar -xzf tamarin.tar.gz
          sudo mv tamarin-prover /usr/local/bin/tamarin-prover
          sudo chmod +x /usr/local/bin/tamarin-prover

      - name: Prove ${{ matrix.lemma }}
        run: |
          LEMMA="${{ matrix.lemma }}"
          if [[ -n "${{ github.event.inputs.lemma }}" ]]; then
            LEMMA="${{ github.event.inputs.lemma }}"
          fi

          TIMEOUT="${{ github.event.inputs.timeout || '45' }}"

          timeout "${TIMEOUT}m" tamarin-prover atheer_protocol.spthy \
            --prove="${LEMMA}" \
            ${{ env.TAMARIN_RTS_FLAGS }} \
            2>&1 | tee "${LEMMA}.log"

          EXIT_CODE=$?

          if [ $EXIT_CODE -eq 124 ]; then
            echo "⏱️ ${LEMMA}: TIMEOUT بعد ${TIMEOUT} دقيقة"
            exit 1
          fi

          if grep -q "verified" "${LEMMA}.log"; then
            echo "✅ ${LEMMA}: verified"
          elif grep -q "falsified" "${LEMMA}.log"; then
            echo "❌ ${LEMMA}: FALSIFIED — يوجد هجوم مضاد!"
            cat "${LEMMA}.log"
            exit 1
          else
            echo "❌ ${LEMMA}: نتيجة غير محددة"
            cat "${LEMMA}.log"
            exit 1
          fi

      - name: Upload proof log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: proof-${{ matrix.lemma }}
          path: ${{ matrix.lemma }}.log

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 4: ملخص النتائج
  # ─────────────────────────────────────────────────────────────────────────
  summary:
    name: "📊 ملخص النتائج"
    runs-on: ubuntu-latest
    needs: [verify-executability, verify-security-lemmas]
    if: always()
    steps:
      - name: Generate summary
        run: |
          echo "## نتائج التحقق الرسمي — أثير v2.0" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| البرهان | النوع | النتيجة |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-------|---------|" >> $GITHUB_STEP_SUMMARY

          EXEC="${{ needs.verify-executability.result }}"
          [[ "$EXEC" == "success" ]] && ICON="✅" || ICON="❌"
          echo "| Executability | exists-trace | $ICON $EXEC |" >> $GITHUB_STEP_SUMMARY

          LEMMA_RESULT="${{ needs.verify-security-lemmas.result }}"
          [[ "$LEMMA_RESULT" == "success" ]] && ICON="✅" || ICON="❌"
          for lemma in Authentication Anti_Replay Session_Integrity Seed_Secrecy \
                       Distance_Bounding Device_Integrity Counter_Monotonicity \
                       Merchant_ZeroKnowledge Switch_NonFrameability; do
            echo "| $lemma | all-traces | $ICON |" >> $GITHUB_STEP_SUMMARY
          done
